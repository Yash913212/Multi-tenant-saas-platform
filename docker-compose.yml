version: '3.8'

services:
  # PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    container_name: database
    environment:
      POSTGRES_DB: saas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_network
    command: postgres -c max_connections=200

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: saas_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-must-be-at-least-32-characters-long-change-this
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://frontend:3000
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      REACT_APP_API_URL: http://backend:5000/api
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - saas_network
    restart: unless-stopped

volumes:
  db_data:

networks:
  saas_network:
    driver: bridge
