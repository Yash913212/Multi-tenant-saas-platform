<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <!-- Background -->
  <rect width="1400" height="900" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="700" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Multi-Tenant SaaS Platform - Database Entity Relationship Diagram (ERD)
  </text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0056b3"/>
    </marker>
    <style>
      .table-header { fill: #0056b3; }
      .table-bg { fill: #e7f3ff; stroke: #0056b3; stroke-width: 2; }
      .pk-field { fill: #fff3cd; }
      .fk-field { fill: #d1ecf1; }
      .normal-field { fill: #ffffff; }
      .text-pk { fill: #856404; font-weight: bold; }
      .text-fk { fill: #0c5460; font-weight: bold; }
      .text-normal { fill: #333333; }
      .line-pk { stroke: #f0ad4e; stroke-width: 2; }
      .line-fk { stroke: #5bc0de; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- TENANTS Table -->
  <g id="tenants">
    <rect x="50" y="100" width="280" height="240" class="table-bg" rx="5"/>
    <rect x="50" y="100" width="280" height="35" class="table-header" rx="5"/>
    <text x="190" y="125" font-size="16" font-weight="bold" fill="white" text-anchor="middle">TENANTS</text>
    
    <!-- Fields -->
    <rect x="50" y="135" width="280" height="25" class="pk-field"/>
    <text x="60" y="153" class="text-pk">PK: id (UUID)</text>
    
    <rect x="50" y="160" width="280" height="25" class="normal-field"/>
    <text x="60" y="178" class="text-normal">name (VARCHAR)</text>
    
    <rect x="50" y="185" width="280" height="25" class="normal-field"/>
    <text x="60" y="203" class="text-normal">subdomain (VARCHAR UNIQUE)</text>
    
    <rect x="50" y="210" width="280" height="25" class="normal-field"/>
    <text x="60" y="228" class="text-normal">status (ENUM)</text>
    
    <rect x="50" y="235" width="280" height="25" class="normal-field"/>
    <text x="60" y="253" class="text-normal">subscription_plan (VARCHAR)</text>
    
    <rect x="50" y="260" width="280" height="25" class="normal-field"/>
    <text x="60" y="278" class="text-normal">max_users, max_projects</text>
    
    <rect x="50" y="285" width="280" height="25" class="normal-field"/>
    <text x="60" y="303" class="text-normal">created_at, updated_at</text>
  </g>
  
  <!-- USERS Table -->
  <g id="users">
    <rect x="420" y="100" width="300" height="290" class="table-bg" rx="5"/>
    <rect x="420" y="100" width="300" height="35" class="table-header" rx="5"/>
    <text x="570" y="125" font-size="16" font-weight="bold" fill="white" text-anchor="middle">USERS</text>
    
    <!-- Fields -->
    <rect x="420" y="135" width="300" height="25" class="pk-field"/>
    <text x="430" y="153" class="text-pk">PK: id (UUID)</text>
    
    <rect x="420" y="160" width="300" height="25" class="fk-field"/>
    <text x="430" y="178" class="text-fk">FK: tenant_id → TENANTS</text>
    
    <rect x="420" y="185" width="300" height="25" class="normal-field"/>
    <text x="430" y="203" class="text-normal">email (VARCHAR)</text>
    
    <rect x="420" y="210" width="300" height="25" class="normal-field"/>
    <text x="430" y="228" class="text-normal">password_hash (VARCHAR)</text>
    
    <rect x="420" y="235" width="300" height="25" class="normal-field"/>
    <text x="430" y="253" class="text-normal">full_name (VARCHAR)</text>
    
    <rect x="420" y="260" width="300" height="25" class="normal-field"/>
    <text x="430" y="278" class="text-normal">role (super_admin|tenant_admin|user)</text>
    
    <rect x="420" y="285" width="300" height="25" class="normal-field"/>
    <text x="430" y="303" class="text-normal">is_active (BOOLEAN)</text>
    
    <rect x="420" y="310" width="300" height="25" class="normal-field"/>
    <text x="430" y="328" class="text-normal">created_at, updated_at</text>
    
    <rect x="420" y="335" width="300" height="25" class="normal-field"/>
    <text x="430" y="353" class="text-normal">UNIQUE(tenant_id, email)</text>
  </g>
  
  <!-- PROJECTS Table -->
  <g id="projects">
    <rect x="810" y="100" width="310" height="240" class="table-bg" rx="5"/>
    <rect x="810" y="100" width="310" height="35" class="table-header" rx="5"/>
    <text x="965" y="125" font-size="16" font-weight="bold" fill="white" text-anchor="middle">PROJECTS</text>
    
    <!-- Fields -->
    <rect x="810" y="135" width="310" height="25" class="pk-field"/>
    <text x="820" y="153" class="text-pk">PK: id (UUID)</text>
    
    <rect x="810" y="160" width="310" height="25" class="fk-field"/>
    <text x="820" y="178" class="text-fk">FK: tenant_id → TENANTS</text>
    
    <rect x="810" y="185" width="310" height="25" class="fk-field"/>
    <text x="820" y="203" class="text-fk">FK: created_by → USERS</text>
    
    <rect x="810" y="210" width="310" height="25" class="normal-field"/>
    <text x="820" y="228" class="text-normal">name (VARCHAR)</text>
    
    <rect x="810" y="235" width="310" height="25" class="normal-field"/>
    <text x="820" y="253" class="text-normal">description (TEXT)</text>
    
    <rect x="810" y="260" width="310" height="25" class="normal-field"/>
    <text x="820" y="278" class="text-normal">status (active|archived)</text>
    
    <rect x="810" y="285" width="310" height="25" class="normal-field"/>
    <text x="820" y="303" class="text-normal">created_at, updated_at</text>
  </g>
  
  <!-- TASKS Table -->
  <g id="tasks">
    <rect x="200" y="470" width="340" height="315" class="table-bg" rx="5"/>
    <rect x="200" y="470" width="340" height="35" class="table-header" rx="5"/>
    <text x="370" y="495" font-size="16" font-weight="bold" fill="white" text-anchor="middle">TASKS</text>
    
    <!-- Fields -->
    <rect x="200" y="505" width="340" height="25" class="pk-field"/>
    <text x="210" y="523" class="text-pk">PK: id (UUID)</text>
    
    <rect x="200" y="530" width="340" height="25" class="fk-field"/>
    <text x="210" y="548" class="text-fk">FK: project_id → PROJECTS</text>
    
    <rect x="200" y="555" width="340" height="25" class="fk-field"/>
    <text x="210" y="573" class="text-fk">FK: tenant_id → TENANTS</text>
    
    <rect x="200" y="580" width="340" height="25" class="fk-field"/>
    <text x="210" y="598" class="text-fk">FK: assigned_to → USERS</text>
    
    <rect x="200" y="605" width="340" height="25" class="normal-field"/>
    <text x="210" y="623" class="text-normal">title (VARCHAR)</text>
    
    <rect x="200" y="630" width="340" height="25" class="normal-field"/>
    <text x="210" y="648" class="text-normal">description (TEXT)</text>
    
    <rect x="200" y="655" width="340" height="25" class="normal-field"/>
    <text x="210" y="673" class="text-normal">status (todo|in_progress|completed)</text>
    
    <rect x="200" y="680" width="340" height="25" class="normal-field"/>
    <text x="210" y="698" class="text-normal">priority (low|medium|high)</text>
    
    <rect x="200" y="705" width="340" height="25" class="normal-field"/>
    <text x="210" y="723" class="text-normal">due_date (DATE)</text>
    
    <rect x="200" y="730" width="340" height="25" class="normal-field"/>
    <text x="210" y="748" class="text-normal">created_at, updated_at</text>
  </g>
  
  <!-- AUDIT_LOGS Table -->
  <g id="audit-logs">
    <rect x="700" y="470" width="320" height="240" class="table-bg" rx="5"/>
    <rect x="700" y="470" width="320" height="35" class="table-header" rx="5"/>
    <text x="860" y="495" font-size="16" font-weight="bold" fill="white" text-anchor="middle">AUDIT_LOGS</text>
    
    <!-- Fields -->
    <rect x="700" y="505" width="320" height="25" class="pk-field"/>
    <text x="710" y="523" class="text-pk">PK: id (UUID)</text>
    
    <rect x="700" y="530" width="320" height="25" class="fk-field"/>
    <text x="710" y="548" class="text-fk">FK: tenant_id → TENANTS</text>
    
    <rect x="700" y="555" width="320" height="25" class="fk-field"/>
    <text x="710" y="573" class="text-fk">FK: user_id → USERS</text>
    
    <rect x="700" y="580" width="320" height="25" class="normal-field"/>
    <text x="710" y="598" class="text-normal">action (CREATE|UPDATE|DELETE)</text>
    
    <rect x="700" y="605" width="320" height="25" class="normal-field"/>
    <text x="710" y="623" class="text-normal">entity_type (VARCHAR)</text>
    
    <rect x="700" y="630" width="320" height="25" class="normal-field"/>
    <text x="710" y="648" class="text-normal">entity_id (UUID)</text>
    
    <rect x="700" y="655" width="320" height="25" class="normal-field"/>
    <text x="710" y="673" class="text-normal">ip_address (VARCHAR)</text>
    
    <rect x="700" y="680" width="320" height="25" class="normal-field"/>
    <text x="710" y="698" class="text-normal">created_at (TIMESTAMP)</text>
  </g>
  
  <!-- Relationships - Lines -->
  
  <!-- TENANTS to USERS (1:M) -->
  <line x1="330" y1="170" x2="420" y2="170" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="375" y="160" font-size="11" fill="#0056b3" font-weight="bold">1:M</text>
  
  <!-- TENANTS to PROJECTS (1:M) -->
  <line x1="330" y1="200" x2="810" y2="150" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="520" y="165" font-size="11" fill="#0056b3" font-weight="bold">1:M</text>
  
  <!-- TENANTS to TASKS (1:M) -->
  <line x1="190" y1="340" x2="340" y2="470" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="260" y="400" font-size="11" fill="#0056b3" font-weight="bold">1:M</text>
  
  <!-- TENANTS to AUDIT_LOGS (1:M) -->
  <line x1="330" y1="280" x2="860" y2="470" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="620" y="380" font-size="11" fill="#0056b3" font-weight="bold">1:M</text>
  
  <!-- USERS to PROJECTS (1:M created_by) -->
  <line x1="570" y1="340" x2="900" y2="340" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="735" y="330" font-size="11" fill="#0056b3" font-weight="bold">created_by</text>
  
  <!-- PROJECTS to TASKS (1:M) -->
  <line x1="820" y1="340" x2="540" y2="470" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="680" y="410" font-size="11" fill="#0056b3" font-weight="bold">1:M</text>
  
  <!-- USERS to TASKS (1:M assigned_to) -->
  <line x1="570" y1="400" x2="370" y2="580" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="450" y="480" font-size="11" fill="#0056b3" font-weight="bold">assigned_to</text>
  
  <!-- USERS to AUDIT_LOGS (1:M) -->
  <line x1="720" y1="350" x2="780" y2="470" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="730" y="400" font-size="11" fill="#0056b3" font-weight="bold">1:M</text>
  
  <!-- Key Constraints Section -->
  <g id="constraints" font-size="12" fill="#333">
    <rect x="1150" y="100" width="220" height="320" fill="#fff9e6" stroke="#856404" stroke-width="1" rx="5"/>
    
    <text x="1160" y="125" font-weight="bold" fill="#856404">KEY CONSTRAINTS</text>
    
    <text x="1160" y="150" font-weight="bold">Primary Keys:</text>
    <text x="1165" y="167" font-size="11">• All tables have UUID PK</text>
    
    <text x="1160" y="190" font-weight="bold">Foreign Keys:</text>
    <text x="1165" y="207" font-size="11">• ON DELETE CASCADE</text>
    <text x="1165" y="222" font-size="11">• ON DELETE SET NULL</text>
    
    <text x="1160" y="245" font-weight="bold">Unique Constraints:</text>
    <text x="1165" y="262" font-size="11">• subdomain (UNIQUE)</text>
    <text x="1165" y="277" font-size="11">• (tenant_id, email)</text>
    
    <text x="1160" y="300" font-weight="bold">Check Constraints:</text>
    <text x="1165" y="317" font-size="11">• status, role, priority</text>
    <text x="1165" y="332" font-size="11">  values verified</text>
    
    <text x="1160" y="355" font-size="10" fill="#666">Indexes on tenant_id,</text>
    <text x="1160" y="370" font-size="10" fill="#666">foreign keys, and</text>
    <text x="1160" y="385" font-size="10" fill="#666">frequently filtered columns</text>
  </g>
  
  <!-- Legend -->
  <g id="legend" font-size="12">
    <rect x="50" y="820" width="1300" height="60" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="5"/>
    
    <text x="65" y="840" font-weight="bold" fill="#333">Legend:</text>
    
    <rect x="150" y="825" width="20" height="20" class="pk-field" stroke="#999" stroke-width="1"/>
    <text x="180" y="840" fill="#333">PK (Primary Key)</text>
    
    <rect x="380" y="825" width="20" height="20" class="fk-field" stroke="#999" stroke-width="1"/>
    <text x="410" y="840" fill="#333">FK (Foreign Key)</text>
    
    <rect x="610" y="825" width="20" height="20" class="normal-field" stroke="#999" stroke-width="1"/>
    <text x="640" y="840" fill="#333">Normal Field</text>
    
    <line x1="850" y1="835" x2="870" y2="835" stroke="#0056b3" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="885" y="840" fill="#333">Relationship (1:M)</text>
  </g>
</svg>