<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="600" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Multi-Tenant SaaS Platform - System Architecture
  </text>
  
  <!-- Client Layer -->
  <g id="client-layer">
    <rect x="50" y="80" width="1100" height="120" fill="none" stroke="#007bff" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="60" y="100" font-size="14" font-weight="bold" fill="#007bff">CLIENT LAYER</text>
    
    <!-- Browser -->
    <rect x="100" y="120" width="150" height="70" fill="#e7f3ff" stroke="#0056b3" stroke-width="2" rx="5"/>
    <text x="175" y="165" font-size="12" font-weight="bold" text-anchor="middle" fill="#0056b3">Web Browser</text>
    
    <!-- Mobile App -->
    <rect x="350" y="120" width="150" height="70" fill="#e7f3ff" stroke="#0056b3" stroke-width="2" rx="5"/>
    <text x="425" y="165" font-size="12" font-weight="bold" text-anchor="middle" fill="#0056b3">Mobile App</text>
    
    <!-- Admin Panel -->
    <rect x="600" y="120" width="150" height="70" fill="#e7f3ff" stroke="#0056b3" stroke-width="2" rx="5"/>
    <text x="675" y="165" font-size="12" font-weight="bold" text-anchor="middle" fill="#0056b3">Admin Panel</text>
    
    <!-- API Clients -->
    <rect x="850" y="120" width="150" height="70" fill="#e7f3ff" stroke="#0056b3" stroke-width="2" rx="5"/>
    <text x="925" y="165" font-size="12" font-weight="bold" text-anchor="middle" fill="#0056b3">API Clients</text>
  </g>
  
  <!-- Application Layer -->
  <g id="app-layer">
    <rect x="50" y="250" width="1100" height="140" fill="none" stroke="#28a745" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="60" y="270" font-size="14" font-weight="bold" fill="#28a745">APPLICATION LAYER</text>
    
    <!-- Frontend -->
    <rect x="100" y="290" width="180" height="80" fill="#d4edda" stroke="#155724" stroke-width="2" rx="5"/>
    <text x="190" y="310" font-size="12" font-weight="bold" text-anchor="middle" fill="#155724">React Frontend</text>
    <text x="190" y="330" font-size="11" text-anchor="middle" fill="#155724">Port: 3000</text>
    <text x="190" y="348" font-size="10" text-anchor="middle" fill="#666">Tailwind CSS</text>
    <text x="190" y="362" font-size="10" text-anchor="middle" fill="#666">Context API</text>
    
    <!-- Backend API -->
    <rect x="400" y="290" width="180" height="80" fill="#d4edda" stroke="#155724" stroke-width="2" rx="5"/>
    <text x="490" y="310" font-size="12" font-weight="bold" text-anchor="middle" fill="#155724">Express.js API</text>
    <text x="490" y="330" font-size="11" text-anchor="middle" fill="#155724">Port: 5000</text>
    <text x="490" y="348" font-size="10" text-anchor="middle" fill="#666">Node.js</text>
    <text x="490" y="362" font-size="10" text-anchor="middle" fill="#666">19 Endpoints</text>
    
    <!-- Services -->
    <rect x="700" y="290" width="180" height="80" fill="#d4edda" stroke="#155724" stroke-width="2" rx="5"/>
    <text x="790" y="310" font-size="12" font-weight="bold" text-anchor="middle" fill="#155724">Core Services</text>
    <text x="790" y="330" font-size="10" text-anchor="middle" fill="#666">Auth Service</text>
    <text x="790" y="345" font-size="10" text-anchor="middle" fill="#666">Tenant Service</text>
    <text x="790" y="360" font-size="10" text-anchor="middle" fill="#666">Project Service</text>
    
    <!-- Middleware -->
    <rect x="1000" y="290" width="130" height="80" fill="#d4edda" stroke="#155724" stroke-width="2" rx="5"/>
    <text x="1065" y="310" font-size="12" font-weight="bold" text-anchor="middle" fill="#155724">Middleware</text>
    <text x="1065" y="330" font-size="10" text-anchor="middle" fill="#666">Auth</text>
    <text x="1065" y="345" font-size="10" text-anchor="middle" fill="#666">CORS</text>
    <text x="1065" y="360" font-size="10" text-anchor="middle" fill="#666">Validation</text>
  </g>
  
  <!-- Data Layer -->
  <g id="data-layer">
    <rect x="50" y="450" width="1100" height="140" fill="none" stroke="#dc3545" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="60" y="470" font-size="14" font-weight="bold" fill="#dc3545">DATA LAYER</text>
    
    <!-- PostgreSQL Database -->
    <rect x="150" y="490" width="220" height="80" fill="#f8d7da" stroke="#721c24" stroke-width="2" rx="5"/>
    <text x="260" y="510" font-size="12" font-weight="bold" text-anchor="middle" fill="#721c24">PostgreSQL Database</text>
    <text x="260" y="530" font-size="11" text-anchor="middle" fill="#721c24">Port: 5432</text>
    <text x="260" y="548" font-size="10" text-anchor="middle" fill="#666">5 Tables</text>
    <text x="260" y="562" font-size="10" text-anchor="middle" fill="#666">Row-Level Isolation</text>
    
    <!-- Cache Layer -->
    <rect x="500" y="490" width="200" height="80" fill="#f8d7da" stroke="#721c24" stroke-width="2" rx="5"/>
    <text x="600" y="510" font-size="12" font-weight="bold" text-anchor="middle" fill="#721c24">Cache (Optional)</text>
    <text x="600" y="530" font-size="11" text-anchor="middle" fill="#721c24">Redis</text>
    <text x="600" y="548" font-size="10" text-anchor="middle" fill="#666">Session Storage</text>
    <text x="600" y="562" font-size="10" text-anchor="middle" fill="#666">Query Cache</text>
    
    <!-- Audit Logs -->
    <rect x="850" y="490" width="200" height="80" fill="#f8d7da" stroke="#721c24" stroke-width="2" rx="5"/>
    <text x="950" y="510" font-size="12" font-weight="bold" text-anchor="middle" fill="#721c24">Audit Logs</text>
    <text x="950" y="530" font-size="11" text-anchor="middle" fill="#721c24">PostgreSQL</text>
    <text x="950" y="548" font-size="10" text-anchor="middle" fill="#666">Immutable Trail</text>
    <text x="950" y="562" font-size="10" text-anchor="middle" fill="#666">Compliance</text>
  </g>
  
  <!-- Infrastructure Layer -->
  <g id="infra-layer">
    <rect x="50" y="650" width="1100" height="120" fill="none" stroke="#6c757d" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="60" y="670" font-size="14" font-weight="bold" fill="#6c757d">INFRASTRUCTURE LAYER</text>
    
    <!-- Docker -->
    <rect x="100" y="690" width="160" height="70" fill="#e2e3e5" stroke="#495057" stroke-width="2" rx="5"/>
    <text x="180" y="710" font-size="12" font-weight="bold" text-anchor="middle" fill="#495057">Docker</text>
    <text x="180" y="730" font-size="11" text-anchor="middle" fill="#666">Containers</text>
    <text x="180" y="747" font-size="10" text-anchor="middle" fill="#666">Orchestration</text>
    
    <!-- Docker Compose -->
    <rect x="350" y="690" width="160" height="70" fill="#e2e3e5" stroke="#495057" stroke-width="2" rx="5"/>
    <text x="430" y="710" font-size="12" font-weight="bold" text-anchor="middle" fill="#495057">Docker Compose</text>
    <text x="430" y="730" font-size="11" text-anchor="middle" fill="#666">Service</text>
    <text x="430" y="747" font-size="10" text-anchor="middle" fill="#666">Orchestration</text>
    
    <!-- Volumes -->
    <rect x="600" y="690" width="160" height="70" fill="#e2e3e5" stroke="#495057" stroke-width="2" rx="5"/>
    <text x="680" y="710" font-size="12" font-weight="bold" text-anchor="middle" fill="#495057">Docker Volumes</text>
    <text x="680" y="730" font-size="11" text-anchor="middle" fill="#666">Data</text>
    <text x="680" y="747" font-size="10" text-anchor="middle" fill="#666">Persistence</text>
    
    <!-- Networks -->
    <rect x="850" y="690" width="160" height="70" fill="#e2e3e5" stroke="#495057" stroke-width="2" rx="5"/>
    <text x="930" y="710" font-size="12" font-weight="bold" text-anchor="middle" fill="#495057">Docker Network</text>
    <text x="930" y="730" font-size="11" text-anchor="middle" fill="#666">Service</text>
    <text x="930" y="747" font-size="10" text-anchor="middle" fill="#666">Discovery</text>
  </g>
  
  <!-- Arrows showing data flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Client to App -->
  <line x1="175" y1="190" x2="190" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="425" y1="190" x2="490" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- App to Data -->
  <line x1="190" y1="370" x2="260" y2="490" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="490" y1="370" x2="600" y2="490" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Key Features -->
  <g id="features" font-size="11" fill="#333">
    <text x="50" y="760" font-weight="bold">Key Features:</text>
    <text x="50" y="778">Multi-Tenancy (Row-Level Isolation) • JWT Authentication • RBAC (3 Roles) • RESTful API (19 Endpoints) • Responsive UI • Audit Logging</text>
  </g>
</svg>